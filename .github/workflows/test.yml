name: Tests

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package (dev)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Pytest
        run: pytest -q

      # Smoke-test the command-line entry points on the shipped example scenario,
      # exercising both the installed `mesoltm` console script and `python -m
      # mesoltm` (the way users actually run a scenario from the command line).
      - name: CLI smoke test
        run: |
          mesoltm examples/scenario.json
          python -m mesoltm examples/scenario.json
