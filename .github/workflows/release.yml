name: Build and Release

# Generic build-and-release workflow. The build runs on every push to the
# default branch; the release (publish) step is commented out for now and should
# be enabled only once the package is ready to be published.
on:
  push:
    branches: [main, master]

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

      # --- Release step (disabled for now) ------------------------------------
      # Uncomment to publish to PyPI. Only runs on the repository's default
      # branch, and requires a PYPI_API_TOKEN secret (or a configured PyPI
      # Trusted Publisher, in which case drop the `with:` block and add
      # `permissions: id-token: write` to this job).
      #
      # - name: Publish to PyPI
      #   if: github.ref_name == github.event.repository.default_branch
      #   uses: pypa/gh-action-pypi-publish@release/v1
      #   with:
      #     password: ${{ secrets.PYPI_API_TOKEN }}
