name: Lint

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  pylint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # plot extra is installed so pylint can resolve matplotlib imports.
      - name: Install package (dev + plot)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,plot]"

      - name: Pylint
        run: pylint src/mesoltm examples
